<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>淘宝Cookie获取工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .step {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }
        .step-number {
            display: inline-block;
            background: #667eea;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            text-align: center;
            line-height: 28px;
            font-weight: bold;
            margin-right: 10px;
        }
        .step-title {
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }
        .step-content {
            color: #555;
            line-height: 1.8;
            margin-left: 38px;
        }
        .code-block {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 12px 16px;
            border-radius: 8px;
            font-family: "Consolas", "Monaco", monospace;
            font-size: 13px;
            margin: 10px 0;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .code-block:hover {
            background: #3d3d3d;
        }
        .code-block::after {
            content: "点击复制";
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 11px;
            color: #888;
            background: rgba(255,255,255,0.1);
            padding: 2px 8px;
            border-radius: 4px;
        }
        .code-block.copied::after {
            content: "已复制!";
            color: #4caf50;
        }
        textarea {
            width: 100%;
            min-height: 120px;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 13px;
            font-family: "Consolas", monospace;
            resize: vertical;
            margin-top: 10px;
        }
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        .btn:active {
            transform: translateY(0);
        }
        .result {
            margin-top: 20px;
            padding: 20px;
            background: #e8f5e9;
            border-radius: 12px;
            border-left: 4px solid #4caf50;
            display: none;
        }
        .result.show {
            display: block;
        }
        .result-title {
            font-weight: bold;
            color: #2e7d32;
            margin-bottom: 10px;
        }
        .result-content {
            background: white;
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            word-break: break-all;
            max-height: 200px;
            overflow-y: auto;
        }
        .copy-btn {
            display: inline-block;
            padding: 6px 16px;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            margin-top: 10px;
        }
        .copy-btn:hover {
            background: #45a049;
        }
        .warning {
            background: #fff3e0;
            border-left: 4px solid #ff9800;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 13px;
            color: #e65100;
        }
        .link {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }
        .link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔑 淘宝Cookie获取工具</h1>
        <p class="subtitle">无需安装任何软件，双击即可运行</p>

        <div class="step">
            <div class="step-title">
                <span class="step-number">1</span>
                登录淘宝
            </div>
            <div class="step-content">
                先用Chrome浏览器打开 <a href="https://login.taobao.com/" target="_blank" class="link">淘宝登录页</a>，完成登录。
            </div>
        </div>

        <div class="step">
            <div class="step-title">
                <span class="step-number">2</span>
                复制Cookie代码
            </div>
            <div class="step-content">
                登录后，在淘宝页面按 <strong>F12</strong> → 点击 <strong>Console（控制台）</strong> → 粘贴以下代码并按回车：
                <div class="code-block" onclick="copyCode(this)">document.cookie</div>
                <p style="margin-top:8px; color:#666; font-size:12px;">👆 点击上方代码即可复制</p>
            </div>
        </div>

        <div class="step">
            <div class="step-title">
                <span class="step-number">3</span>
                粘贴Cookie
            </div>
            <div class="step-content">
                将上一步复制的一长串字符粘贴到下方：
                <textarea id="cookieInput" placeholder="请粘贴从Console复制的Cookie字符串..."></textarea>
            </div>
        </div>

        <button class="btn" onclick="formatCookie()">✨ 格式化并保存Cookie</button>

        <div class="result" id="result">
            <div class="result-title">✅ Cookie已格式化！</div>
            <div class="result-content" id="resultContent"></div>
            <button class="copy-btn" onclick="copyResult()">复制到剪贴板</button>
            <div style="margin-top:10px; font-size:12px; color:#666;">
                文件已保存到: <span id="fileName"></span>
            </div>
        </div>

        <div class="warning">
            <strong>⚠️ 安全提示：</strong>Cookie包含登录凭证，请勿分享给他人！
        </div>
    </div>

    <script>
        // 复制代码到剪贴板
        function copyCode(element) {
            const code = element.textContent;
            navigator.clipboard.writeText(code).then(() => {
                element.classList.add('copied');
                setTimeout(() => {
                    element.classList.remove('copied');
                }, 2000);
            });
        }

        // 格式化Cookie
        function formatCookie() {
            const input = document.getElementById('cookieInput').value.trim();
            
            if (!input) {
                alert('请先粘贴Cookie字符串！');
                return;
            }

            // 清理
            let cookie = input.replace(/^["']|["']$/g, '').trim();
            
            // 检查格式
            if (!cookie.includes(';')) {
                if (!confirm('Cookie中未找到分号，可能格式不正确。是否继续？')) {
                    return;
                }
            }

            // 显示结果
            const resultDiv = document.getElementById('result');
            const resultContent = document.getElementById('resultContent');
            const fileName = document.getElementById('fileName');
            
            resultContent.textContent = cookie;
            fileName.textContent = 'taobao_cookie.txt（已下载）';
            resultDiv.classList.add('show');

            // 自动下载文件
            downloadFile(cookie, 'taobao_cookie.txt');
        }

        // 复制结果
        function copyResult() {
            const content = document.getElementById('resultContent').textContent;
            navigator.clipboard.writeText(content).then(() => {
                alert('已复制到剪贴板！');
            });
        }

        // 下载文件
        function downloadFile(content, filename) {
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
